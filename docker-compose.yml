# ─────────────────────────────────────────────────────
# docker-compose.yml — Local development setup
# Usage: docker-compose up --build
# ─────────────────────────────────────────────────────

version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai_news_dashboard
    ports:
      - "8000:8000"
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/data
      # Hot-reload for local development (comment out for production)
      - .:/app
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - DATABASE_URL=sqlite:////data/ai_news.db
      - ENV=development
    command: >
      uvicorn main:app
      --host 0.0.0.0
      --port 8000
      --reload
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
    driver: local
