<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favorites — AI News Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="/static/css/style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <span class="brand-icon"><i class="fas fa-brain"></i></span>
      <span class="brand-text">AI<span class="brand-accent">Pulse</span></span>
    </a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <a href="/" class="nav-pill"><i class="fas fa-newspaper me-1"></i>Feed</a>
      <a href="/favorites" class="nav-pill active"><i class="fas fa-star me-1"></i>Favorites</a>
      <a href="/logs" class="nav-pill"><i class="fas fa-satellite-dish me-1"></i>Broadcasts</a>
    </div>
  </div>
</nav>

<div class="hero-banner">
  <div class="container-fluid px-4">
    <h1 class="hero-title"><i class="fas fa-star me-2 text-accent"></i>Favorites</h1>
    <p class="hero-sub">Your curated collection of saved AI news articles</p>
  </div>
</div>

<div class="container-fluid px-4 py-3">
  <div id="loadingState" class="text-center py-5">
    <div class="spinner-ring"></div>
    <p class="mt-3 text-muted">Loading favorites...</p>
  </div>

  <div id="emptyState" class="empty-state d-none">
    <i class="fas fa-star fa-3x mb-3 text-muted"></i>
    <h5>No favorites yet</h5>
    <p class="text-muted">Go to the <a href="/" class="text-accent">News Feed</a> and star articles you want to save here.</p>
  </div>

  <div class="news-grid" id="favoritesGrid"></div>
</div>

<!-- Broadcast Modal -->
<div class="modal fade" id="broadcastModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content glass-modal">
      <div class="modal-header border-0">
        <h5 class="modal-title"><i class="fas fa-satellite-dish me-2 text-accent"></i>Broadcast Article</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="modal-article-title" id="modalArticleTitle"></p>
        <p class="text-muted small mb-3">Select a platform to simulate broadcasting:</p>
        <div class="platform-grid">
          <button class="platform-btn email-btn" onclick="doBroadcast('email')">
            <i class="fas fa-envelope fa-lg mb-1"></i><span>Email</span>
          </button>
          <button class="platform-btn linkedin-btn" onclick="doBroadcast('linkedin')">
            <i class="fab fa-linkedin fa-lg mb-1"></i><span>LinkedIn</span>
          </button>
          <button class="platform-btn whatsapp-btn" onclick="doBroadcast('whatsapp')">
            <i class="fab fa-whatsapp fa-lg mb-1"></i><span>WhatsApp</span>
          </button>
        </div>
        <div id="broadcastResult" class="broadcast-result d-none"></div>
      </div>
    </div>
  </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast align-items-center text-white border-0" role="alert">
    <div class="d-flex">
      <div class="toast-body" id="toastMsg"></div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/favorites.js"></script>
</body>
</html>
