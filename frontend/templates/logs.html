<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Broadcast Logs — AI News Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="/static/css/style.css" rel="stylesheet"/>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="/">
      <span class="brand-icon"><i class="fas fa-brain"></i></span>
      <span class="brand-text">AI<span class="brand-accent">Pulse</span></span>
    </a>
    <div class="d-flex align-items-center gap-3 ms-auto">
      <a href="/" class="nav-pill"><i class="fas fa-newspaper me-1"></i>Feed</a>
      <a href="/favorites" class="nav-pill"><i class="fas fa-star me-1"></i>Favorites</a>
      <a href="/logs" class="nav-pill active"><i class="fas fa-satellite-dish me-1"></i>Broadcasts</a>
    </div>
  </div>
</nav>

<div class="hero-banner">
  <div class="container-fluid px-4">
    <h1 class="hero-title"><i class="fas fa-satellite-dish me-2 text-accent"></i>Broadcast Logs</h1>
    <p class="hero-sub">Simulated broadcast history — Email · LinkedIn · WhatsApp</p>
  </div>
</div>

<div class="container-fluid px-4 py-4">
  <div id="loadingState" class="text-center py-5">
    <div class="spinner-ring"></div>
    <p class="mt-3 text-muted">Loading logs...</p>
  </div>

  <div id="emptyState" class="empty-state d-none">
    <i class="fas fa-satellite-dish fa-3x mb-3 text-muted"></i>
    <h5>No broadcasts yet</h5>
    <p class="text-muted">Go to the <a href="/" class="text-accent">News Feed</a> and use the Broadcast button on any article.</p>
  </div>

  <div class="logs-container d-none" id="logsContainer">
    <div class="logs-header mb-3">
      <span id="logCount" class="stat-chip"></span>
    </div>
    <div class="table-responsive">
      <table class="logs-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Platform</th>
            <th>Article</th>
            <th>Caption Preview</th>
            <th>Status</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="logsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/logs.js"></script>
</body>
</html>
